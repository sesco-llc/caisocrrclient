      properties:
        portfolioName:
          type: string
          pattern: '^(?!.*[\s\._-])[A-Za-z0-9]+$|^(?=.*[A-Za-z0-9])[A-Za-z0-9\s\._-]+$'
          description: name of CRR auction portfolio
