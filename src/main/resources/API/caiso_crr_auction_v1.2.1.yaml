          maxLength: 50
          example: AUC_AN_2024
        participantName:
          $ref: '#/components/schemas/ParticipantName'
        
    PortfolioStatusType:
      type: string
      description: Status VALID is assigned to a portfolio containing valid bids and offers. Status INVALID is assigned to a portfolio containing one or more invalid bids and offers. A bid/offer with an INVALID status is saved only if the record is added to the portfolio using Add and Save button in MUI Bid/Offer Editor or the portfolio fails the validations during portfolio submission. Status SUBMITTED is assigned to a portfolio after portfolio submission is successful. Status REJECTED is a transitional status to VALID status after portfolio submission is rejected. Status DELETED is a confirmation of the portfolio deletion. Status NEW is assigned to a blank portfolio.
      enum:
        - INVALID
        - VALID
        - SUBMITTED
        - REJECTED
        - DELETED
        - NEW

    PortfolioStatus:
      type: object
      required:
        - portfolioName
        - marketName
        - status

      properties:
        portfolioName:
          type: string
          pattern: '^(?!.*[\s\._-])[A-Za-z0-9]+$|^(?=.*[A-Za-z0-9])[A-Za-z0-9\s\._-]+$'
          description: name of auction portfolio
          maxLength: 100
          example: Portfolio XYZ
        marketName:
          type: string
          pattern: '^([a-zA-Z0-9\. _-]*)$'
          description: name of CRR Auction market that the portfolio is designated for
          maxLength: 50
          example: AUC_AN_2024
        status:
          $ref: '#/components/schemas/PortfolioStatusType'
        errorMessage:
          type: string
          description: error message or error report indicating the reason that the portfolio is in INVALID status if the bids/offers in the portfolio are created from MUI Bid/Offer Editor or if portfolio submission fails.
          maxLength: 2147483647
          example: 'CRR ID 1111 is prohibited to be sold while another secondary market transaction to trade this CRR is currently pending for credit check.; A sell offer of CRR ID : "1097488538" has already been submitted.;'

    PortfolioCredit:
      type: object
      required:
        - portfolioName
        - marketName
        - requiredCredit

      properties:
        portfolioName:
          type: string
          pattern: '^(?!.*[\s\._-])[A-Za-z0-9]+$|^(?=.*[A-Za-z0-9])[A-Za-z0-9\s\._-]+$'
          description: name of auction portfolio
