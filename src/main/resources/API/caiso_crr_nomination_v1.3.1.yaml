    PortfolioStatusType:
      type: string
      description: Status NEW is assigned to a blank portfolio. Status VALID is assigned to a portfolio containing valid nominations. Status INVALID is assigned to a portfolio containing one or more invalid nominations. A nomination with an INVALID status is saved only if the record is added to the portfolio using Add and Save button in MUI Nomination Editor. INVALID portfolio created from API and MUI upload is not saved. Status SUBMITTED is assigned to a portfolio after portfolio submission is successful. Status REJECTED is a transitional status to VALID status after portfolio submission is rejected. Status DELETED is a confirmation of the portfolio deletion.
      enum:
        - INVALID
        - VALID
        - SUBMITTED
        - REJECTED
        - DELETED
        - NEW
      
