info:
  description: CRR Market Data OpenAPI allows CRR Market Data and CRR Nomination Cap Data Download.\n <table><tr><td>OpenAPI Spec Revision</td><td>Date</td><td>Change Log</td></tr><tr><td>1.0.0</td><td>2024-01-10</td><td>Initial Version</td></tr><tr><td>1.1.0</td><td>2024-06-12</td><td>Added missing 'SET_ASIDE' enum back to model 'PublicMarketDownloadType' and revised its description</td></tr><tr><td>1.1.1</td><td>2024-06-12</td><td>Fixed typographical errors</td></tr><tr><td>1.1.2</td><td>2024-07-22</td><td>Added an error code 'SER0017'; Updated API summary a very high level preview of what the endpoint achieves and the description can explain it a bit further</td></tr><tr><td>1.1.3</td><td>2024-10-08</td><td>Added an error code 'MKT0007'.</td></tr><tr><td>1.2.0</td><td>2024-11-05</td><td>Update all date-time field examples and remove 'milliseconds' component;  Update CRRServiceException by having an array of 'ErrorDetail' which contain severity, errorCode, and errorDescription; Add comments to description of CRRServiceException; Replace error code ATH0002 with SEC0001; Remove error codes that are not applicable to CRR market data APIs; Add error code SER0030 for error from other generic data validations or error in the individual record in the body; Update responses to have HTTP status codes 403, 404, and 500 with content of object CRRServiceException; Error code SER0028 is used for response 404 and error code SER0029 for response 500; Update JSON schema version numbers in the descriptions of download types;</td></tr></table>
  version: 1.2.0
  title: CRR Market Data API
  contact:
    email: servicedesk@caiso.com
tags:
  - name: CRR Market Data Read
    description: requires read only
