components:
  parameters:
    ParticipantName:
      in: query
      name: participantName
      description: Market Participant Name
      required: true
      schema:
        type: string
        pattern: '^([a-zA-Z0-9\. _-]*)$'
        maxLength: 64
      example: 'CISO'
    FileFormat:
      in: query
      name: fileFormat
      description: file extension
      required: true
      schema:
        enum:
          - CSV
          - JSON      
    PublicGeneralDownloadType:
      in: query
      name: publicGeneralDownloadType
      description: Public General Download Types include public existing CRRs in the system (PUBLIC_EXISTING_CRR uses CRRExistingCRRs_v1.1.2.draft-07.schema.json) and a list of source/sink replacement (SOURCE_SINK_REPLACEMENT uses CRRSourceandSinkNameMapping_v1.0.1.draft-07.schema.json).
      required: true
      schema:
        type: string
        enum:
          - PUBLIC_EXISTING_CRR 
          - SOURCE_SINK_REPLACEMENT
    MarketName:
      in: query
      name: marketName
      description: The name of the market
      required: true
      schema:
        type: string
        pattern: '^([a-zA-Z0-9\. _-]*)$'
        maxLength: 50
    NominationCapCalcName:
      in: query
      name: nominationCapCalcName
      description: The name of the nomination cap calculation
      required: true
      schema:
        type: string
        pattern: '^([a-zA-Z0-9\. _-]*)$'
        maxLength: 40    
    PublicMarketDownloadType:
      in: query
      name: publicMarketDownloadType
      description: Public Market Download Types include public grouped base loading CRRs (GROUPED_BASE_LOADING uses CRRGroupedBaseLoading_v1.0.2.draft-07.schema.json), source/sink list (SOURCE_SINK uses CRRSourceSink_v1.0.1.draft-07.schema.json) of a CRR market. Some markets will also have available interface constraint Set Aside data (SET_ASIDE uses CRRSetAside_v1.1.1.draft-07.schema.json).
      required: true
      schema:
        type: string
        enum:
          - GROUPED_BASE_LOADING
          - SOURCE_SINK  
          - SET_ASIDE
    PublicAllocationResultDownloadType:
      in: query
      name: publicAllocationResultDownloadType
      description: Public Allocation Download Types include binding constraints (BINDING_CONSTRAINT uses CRRBindingConstraint_v1.0.1.draft-07.schema.json) and public allocation results (PUBLIC_ALLOCATION_RESULT uses CRRPublicAllocationResult_v1.0.3.draft-07.schema.json) of a CRR allocation.
      required: true
      schema:
        type: string
        enum:
          - BINDING_CONSTRAINT
          - PUBLIC_ALLOCATION_RESULT
    PublicAuctionResultDownloadType:
      in: query
      name: publicAuctionResultDownloadType
      description: Public Auction Download Types include binding constraints (BINDING_CONSTRAINT uses CRRBindingConstraint_v1.0.1.draft-07.schema.json), public auction results (PUBLIC_AUCTION_RESULT uses CRRPublicAuctionResult_v1.1.1.draft-07.schema.json), and source/sink clearing prices (CLEARING_PRICE uses CRRSourceSinkClearingPRice_v1.0.1.draft-07.schema.json) of a CRR auction.
      required: true
      schema:
        type: string
        enum:
          - BINDING_CONSTRAINT
          - PUBLIC_AUCTION_RESULT
          - CLEARING_PRICE
    PrivateGeneralDownloadType:
      in: query
      name: privateGeneralDownloadType
      description: Private General Download Type includes private existing CRRs of specified participant. Private Existing CRRs download types grouped by CRRs created from Allocation (PRIVATE_EXISTING_CRR_ALLOCATION, CRRs created from Auction (PRIVATE_EXISTING_CRR_AUCTION), CRRs created from Secondary Market (PRIVATE_EXISTING_CRR_SECONDARY_MARKET), CRRs created by the system including MT_TOR CRRs created from TOR-MT_TOR CRR Conversion (PRIVATE_EXISTING_CRR_SYSTEM), CRRs created from Load Migration process which are effective in the current year and three following years (PRIVATE_EXISTING_CRR_LM_CURRENT_PLUS_3), and CRRs created from Load Migration process which are effective after the next three years (PRIVATE_EXISTING_CRR_BEYOND_3). All private general download type use CRRExistingCRRs_v1.1.2.draft-07.schema.json.
      required: true
      schema:
        type: string
        enum:
          - PRIVATE_EXISTING_CRR_ALLOCATION
          - PRIVATE_EXISTING_CRR_AUCTION
          - PRIVATE_EXISTING_CRR_SECONDARY_MARKET
          - PRIVATE_EXISTING_CRR_SYSTEM
          - PRIVATE_EXISTING_CRR_LM_CURRENT_PLUS_3
          - PRIVATE_EXISTING_CRR_LM_BEYOND_3
    PrivateAllocationDataDownloadType:
      in: query
      name: privateAllocationDataDownloadType
      description: Private Allocation Download Types include signature pairs (SIGNATURE uses CRRSignatureResult_v1.1.0.draft-07.schema.json), sink upper bound (UPPER_BOUND uses CRRUpperBoundResult_v1.1.0.draft-07.schema.json), sink seasonal eligible quantities (SEQ uses CRRSEQResult_v1.1.0.draft-07.schema.json), and sink monthly eligible quantities (MEQ uses CRRMEQResult_v1.1.0.draft-07.schema.json) used in CRR nomination validations of a Nomination Cap calculation.
      required: true
      schema:
        type: string
        enum:
          - SIGNATURE
          - UPPER_BOUND
          - SEQ
          - MEQ
    PrivateAllocationResultDownloadType:
      in: query
      name: privateAllocationResultDownloadType
      description: Private Allocation Results download type. Allocation results of given participant name are included in the download file. PRIVATE_ALLOCATION_RESULT uses CRRPrivateAllocation_v1.draft-07.schema.
      required: true
      schema:
        type: string
        enum:
          - PRIVATE_ALLOCATION_RESULT
    PrivateAuctionResultDownloadType:
      in: query
      name: privateAuctionResultDownloadType
      description: Private Auction Results download type. Auction results of given participant name are included in the download file. PRIVATE_AUCTION_RESULT uses CRRPrivateAuction_v1.draft-07.schema.
      required: true
      schema:
        type: string
        enum:
          - PRIVATE_AUCTION_RESULT
    CAISORequestUUID:
      in: header
      name: caiso-request-id
      description: An HTTP header with a unique UUID (Universal Unique Identifier) for every request
      schema:
        type: string
        format: uuid
      required: true
      example: c9b09ec1-3a3a-4e68-a4d7-89aece526b05
  
  schemas:
    CRRServiceException:
        description: |
          <table>
            <tr>
              <th>Error Code</th>
              <th>Description</th>
              <th>Comment</th>
            </tr>
            <tr>
              <td> GEN0003 </td>
              <td> System is busy due to too many users, please try again later. </td>
              <td> Generic System Validation </td>
            </tr>            
            <tr>
              <td> SEC0001 </td>
              <td> Access for Market Participant {0} is denied due to insufficient privilege. </td>
              <td> Security Validation </td>
            </tr>            
            <tr>
              <td>SEC0002</td>
              <td>Access Denied. Please contact your Local Security Administrator.</td>
              <td> Security Validation </td>
            </tr>
            <tr>
              <td>MKT0001</td>
              <td>Market name does not exist in the system.</td>
              <td> Market Validation </td>
            </tr>
            <tr>
              <td>MKT0007</td>
              <td>The results of the specified market have not been posted.</td>
              <td> Market Validation </td>
            </tr>
            <tr>
              <td>DWL0001</td>
              <td>Download type is invalid.</td>
              <td> Download Validation </td>
            </tr>
            <tr>
              <td>DWL0002</td>
              <td>Download file format is invalid for the specified download type.</td>
              <td> Download Validation </td>
            </tr>
            <tr>
              <td>DWL0005</td>
              <td>No data available for the given market, download type, and file format. </td>
              <td> Download Validation </td>
            </tr>
            <tr>
              <td>DWL0006</td>
              <td>No data available for the given market, download type, and participant name. </td>
              <td> Download Validation </td>
            </tr>            
            <tr>
              <td> CAP0001 </td>
              <td> Nomination Cap name does not exist for the download type. </td>
              <td> Nomination Cap Download Validation </td>
            </tr>
            <tr>
              <td> CAP0002 </td>
              <td> Results of Nomination Cap calculation has not been posted. </td>
              <td> Nomination Cap Download Validation </td>
            </tr>  
            <tr>
             <td>SER0001</td>
             <td>Please report the issue and provide the API access parameters to CAISO.</td>
             <td> Service and Business validation </td>
            </tr>
            <tr>
              <td>SER0002</td>
              <td>Invalid participant name {0}.</td>
              <td> Service and Business validation </td>
            </tr>
            <tr>
              <td>SER0003</td>
              <td>Unable to create the download file. Please try again later.</td>
              <td> Service and Business validation </td>
            </tr>
            <tr>
              <td>SER0005</td>
              <td>Invalid market type or term of market {0}.</td>
              <td> Service and Business validation </td>
            </tr>
            <tr>
              <td>SER0017</td>
              <td>Invalid request "{0}".</td>
              <td> Service and Business validation </td>
            </tr>            
            <tr>
              <td> SER0028 </td>
              <td> Internal Service Error </td>
              <td> Service and Business validation for response in 500</td>
            </tr>
            <tr>
              <td> SER0029</td>
              <td> Cannot find a resource </td>
              <td> Service and Business validation for response in 404</td>
            </tr>              
            <tr>
              <td> SER0030 </td>
              <td> {0}</td>
              <td> Service and Business validation. Error from other generic data validations or error in the individual record in the body </td>
            </tr>            
          </table>
        type: object
        required:
          - errorList
          - creationTime
  
        properties:
          errorList:
            type: array
            items:
              $ref: '#/components/schemas/ErrorDetail'
          creationTime:
            type: string
            description: date and time when the error is issued.
            format: date-time
            example: '2099-07-04T09:12:33Z'
          serviceVersion:
            type: string
            description: version of service
            maxLength: 10
            example: 'V1.0'
    ErrorDetail:
      type: object
      required:
        - errorCode
        - errorDescription
        - severity

      properties:  
          errorDescription:
            type: string
            description: "JSON syntax error, error in the input parameter of the request (such as the object identifier does not exist), generic data validation (such as the submission window is not open), or error in the individual record"
            maxLength: 1000
            example: "Error description."
          errorCode:
            type: string
            description: error code
            maxLength: 15
            example: 'XXX0000'
          severity:
            type: string
            enum:
              - FATAL
              - ERROR