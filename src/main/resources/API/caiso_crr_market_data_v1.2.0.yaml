        - $ref: '#/components/parameters/FileFormat'        
        - $ref: '#/components/parameters/ParticipantName'
      responses:
        '200':
          description: A compressed object containing requested data
          content:
            application/octet-stream:
              schema:
                type: object
                properties:
                  items:
                    type: string
                    format: binary
                    description: Base64-encoded contents of the data
        '400':
