openapi: 3.0.0
servers:
  - description: Mapstage Server Endpoint
    url: https://mapstage-api.caiso.com/crr
info:
  description: OpenAPI allows UDC Data Submission and Load Migration Results download. <table><tr><td>OpenAPI Spec Revision</td><td>Date</td><td>Change Log</td></tr><tr><td>1.0.0</td><td>2024-01-10</td><td>Initial Version</td></tr><tr><td>1.1.0</td><td>2024-06-12</td><td>Fixed OperationId for API /loadMigrationCrrResults; Added an extra required field 'effectiveDate' to POST API /PostDASRsummaryset</td></tr><tr><td>1.1.1</td><td>2024-06-12</td><td>Fixed typographical errors</td></tr><tr><td>1.1.2</td><td>2024-07-22</td><td>Added an error code 'SER0017'; Updated API summary a very high level preview of what the endpoint achieves and the description can explain it a bit further</td></tr><tr><td>1.2.0</td><td>2024-08-29</td><td>Added a field 'tou' for Time of Use to /loadPercentage API response.</td></tr><tr><td>1.2.1</td><td>2024-08-29</td><td>Marked 'LMMarketStatus' model fields as required</td></tr><tr><td>1.2.2</td><td>2024-09-12</td><td>Changed 'lse' field maxLength to 9 and pattern to be numbers only.</td></tr><tr><td>1.2.3</td><td>2024-09-13</td><td>Changed maximum spec from  99999999999999999999 to doable size 9223372036854775807 that fit in the system.</td></tr><tr><td>1.3.0</td><td>2024-11-04</td><td>Update all date-time field examples and remove 'milliseconds' component; Update CRRServiceException by having an array of 'ErrorDetail' which contain severity, errorCode, and errorDescription; Add comments to description of CRRServiceException; Update responses to have HTTP status codes 403, 404, and 500 with content of object CRRServiceException; Error code SER0028 is used for response 404 and error code SER0029 for response 500; Remove errorMessage from UDCSubmissionStatus; Remove ERROR from enum of SubmissionStatus;</td></tr><tr><td>1.3.1</td><td>2024-11-21</td><td>Add error code LMV1003 for the error that the specified load migration market name does not exist in the system; Add error code SEC0002 for invalid participant name;</td></tr><tr><td>1.3.2</td><td>2024-12-17</td><td>Add error code LMV023</td></tr></table>
  version: 1.3.2
  title: CRR Load Migration API
  contact:
    email: servicedesk@caiso.com
tags:
  - name: CRR Load Migration Write
    description: require read/write access
  - name: CRR Load Migration Read
    description: requires read only
paths:
  /loadmigration/v1.0/activeLoadMigrationMarketList:
    get:
      tags:
        - CRR Load Migration Read
      summary: Gets a list of active load migration markets
      operationId: getActiveLoadMigrationMarketList
      description: gets a list of load migration markets that are open now, closed or open in the future for authorized participant. Markets that have open date in the future will have status 'PREP'
      parameters: 
        - $ref: '#/components/parameters/CAISORequestUUID'
        - $ref: '#/components/parameters/ParticipantName'      
      responses:
        '200':
          description: an array of load migration market
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LoadMigrationMarket'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
  /loadmigration/v1.0/postedLoadMigrationMarketList:
    get:
      tags:
        - CRR Load Migration Read
      summary: Gets a list of posted load migration markets
      operationId: getPostedLoadMigrationMarketList
      description: gets a list of posted load migration markets for authorized participant
      parameters: 
        - $ref: '#/components/parameters/CAISORequestUUID'
        - $ref: '#/components/parameters/ParticipantName'
      responses:
        '200':
          description: an array of load migration market
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LoadMigrationMarket'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'          
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
  /loadmigration/v1.0/loadMigrationMarketStatus:
    get:
      tags:
        - CRR Load Migration Read
      summary: Gets status of a load migration market
      operationId: getLoadMigrationMarketStatus
      description: gets status of load migration market for a given load migration market name for authorized participant
      parameters:
        - $ref: '#/components/parameters/CAISORequestUUID'
        - $ref: '#/components/parameters/LoadMigrationMarketName'        
        - $ref: '#/components/parameters/ParticipantName'
      responses:
        '200':
          description: status of load migration market
          content:
            application/json:
              schema:
                type: object
                required:
                  - marketStatus
                properties:
                  marketStatus:
                    $ref: '#/components/schemas/LMMarketStatus'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'  
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
  /loadmigration/v1.0/loadPercentage:
    get:
      tags:
        - CRR Load Migration Read
      summary: Gets load percentage data from given market name
      operationId: getLoadPercentages
      description: gets load percentage and transfer MW by pair of load gaining and lose losing LSEs for the given load migration market, and participant name
      parameters:
        - $ref: '#/components/parameters/CAISORequestUUID'
        - $ref: '#/components/parameters/LoadMigrationMarketName'      
        - $ref: '#/components/parameters/ParticipantName'
      responses:
        '200':
          description: load percentage results for a given market name and participant name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoadPercentageResults'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
  /loadmigration/v1.0/loadMigrationCrrResults:
    get:
      tags:
        - CRR Load Migration Read
      summary: Gets load migration CRRs data from given market name
      operationId: getLoadMigrationCRRs
      description: gets load migration CRRs and incremental MW added to existing load migration CRRs created for the given load migration market, and participant name who has load transfer
      parameters:
        - $ref: '#/components/parameters/CAISORequestUUID'
        - $ref: '#/components/parameters/LoadMigrationMarketName'      
        - $ref: '#/components/parameters/ParticipantName'
      responses:
        '200':
          description: load migration results for a given market name and participant name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoadMigrationResults'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'  
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'              
  /loadmigration/v1.0/nHourData:
    get:
      tags:
        - CRR Load Migration Read
      summary: Gets N-Hour data from given market name
      operationId: getNHourData
      description: gets UDC H-Hour Data for a given load migration market name and UDC user
      parameters:
        - $ref: '#/components/parameters/CAISORequestUUID'
        - $ref: '#/components/parameters/LoadMigrationMarketName'
        - $ref: '#/components/parameters/ParticipantName'  
      responses:
        '200':
          description: N-Hour Data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NHourData'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
  /loadmigration/v1.0/existingNumberOfCustomers:
    get:
      tags:
        - CRR Load Migration Read
      summary: Gets number of customers data from given market name
      operationId: getExistingNumberOfCustomers
      description: gets UDC's number of customers posted to the load migration market for the specified UDC user
      parameters:
        - $ref: '#/components/parameters/CAISORequestUUID'
        - $ref: '#/components/parameters/LoadMigrationMarketName'      
        - $ref: '#/components/parameters/ParticipantName'  
      responses:
        '200':
          description: Submission Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NumberOfCustomersSet'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'               
  /loadmigration/v1.0/numberOfCustomers:
    post:
      tags:
        - CRR Load Migration Write
      summary: Uploads number of customers data
      operationId: postNumberOfCustomers
      description: uploads number of customers data to given market name and UDC name
      parameters:
        - $ref: '#/components/parameters/CAISORequestUUID'
        - $ref: '#/components/parameters/ParticipantName'      
      responses:
        '200':
          description: Submission Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UDCSubmissionStatus'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'  
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'                     
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostNumberOfCustomersSet'           
  /loadmigration/v1.0/existingDasrSummary:
    get:
      tags:
        - CRR Load Migration Read
      summary: Gets DASR summary data from given market name
      operationId: getExistingDasrSummary
      description: gets UDC's DASR Summary posted to the load migration market for the specified UDC user
      parameters:
        - $ref: '#/components/parameters/CAISORequestUUID'
        - $ref: '#/components/parameters/LoadMigrationMarketName'   
        - $ref: '#/components/parameters/ParticipantName'
      responses:
        '200':
          description: Submission Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DASRsummaryset'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'              
  /loadmigration/v1.0/dasrSummary:
    post:
      tags:
        - CRR Load Migration Write
      summary: Uploads DASR Summary data
      operationId: postDasrSummary
      description: uploads UDC's Direct Access Service Request Summary to given market name and UDC name
      parameters: 
        - $ref: '#/components/parameters/CAISORequestUUID'
        - $ref: '#/components/parameters/ParticipantName'      
      responses:
        '200':
          description: Submission Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UDCSubmissionStatus'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'                 
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostDASRsummaryset'         
  /loadmigration/v1.0/existingCustomerRates:
    get:
      tags:
        - CRR Load Migration Read
      summary: Gets UDC customer rates data from given market name
      operationId: getExistingCustomerRates
      description: gets UDC's customer rates posted to the load migration market for the specified UDC user
      parameters: 
        - $ref: '#/components/parameters/CAISORequestUUID'
        - $ref: '#/components/parameters/LoadMigrationMarketName'         
        - $ref: '#/components/parameters/ParticipantName'
      responses:
        '200':
          description: Submission Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerRateSet'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'              
  /loadmigration/v1.0/customerRates:
    post:
      tags:
        - CRR Load Migration Write
      summary: Uploads UDC customer rates
      operationId: postCustomerRates
      description: uploads UDC's customer rates to given market name and UDC name
      parameters: 
        - $ref: '#/components/parameters/CAISORequestUUID'
        - $ref: '#/components/parameters/ParticipantName'      
      responses:
        '200':
          description: Submission Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UDCSubmissionStatus'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException' 
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'           
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CRRServiceException'                  
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCustomerRateSet'                        
components:
  parameters:
    LoadMigrationMarketName:
      in: query 
      name: loadMigrationMarketName
      description: Name of load migration market
      required: true
      schema:
        type: string
        pattern: '^([a-zA-Z0-9\. _-]*)$'
        maxLength: 50
        example: LOAD_MIGRATION_2022 
    ParticipantName:
      in: query
      name: participantName
      description: Market Participant Name
      required: true
      schema:
        type: string
        pattern: '^([a-zA-Z0-9\. _-]*)$'
        maxLength: 64
      example: CISO           
    CAISORequestUUID:
      in: header
      name: caiso-request-id
      description: An HTTP header with a unique UUID (Universal Unique Identifier) for every request
      schema:
        type: string
        format: uuid
      required: true
      example: c9b09ec1-3a3a-4e68-a4d7-89aece526b05
  
  schemas:
    CRRServiceException:
        description: |
          <table>
            <tr>
              <th>Error Code</th>
              <th>Description</th>
              <th>Comment</th>
            </tr>
            <tr>
              <td> LMV0101 </td>
              <td> N-Hour data is not available in the specified Load Migration Market. </td>
              <td> Load Migration Validation </td>
            </tr>
            <tr>
              <td> LMV0102 </td>
              <td> Submission window for load migration market {0} is not open. </td>
              <td> Load Migration Validation </td>
            </tr>
            <tr>
              <td> LMV0103 </td>
              <td> Results of load migration market {0} have not been posted. </td>
              <td> Load Migration Validation </td>
            </tr>
            <tr>
              <td> LMV023 </td>
              <td> Effective Date {0} does not match load migration market effective date {1}. </td>
              <td> Load Migration Validation </td>
            </tr>
            <tr>
              <td> LMV024 </td>
              <td> Invalid UDC name: {0} </td>
              <td> Load Migration Validation </td>
            </tr>
            <tr>
              <td> LMV1002 </td>
              <td> The load migration market has not been configured. </td>
              <td> Load Migration Validation </td>
            </tr>   
            <tr>
              <td> LMV1003 </td>
              <td> The specified load migration market name does not exist in the system. </td>
              <td> Load Migration Validation </td>
            </tr>          
            <tr>
              <td> SEC0001 </td>
              <td> Access for Market Participant {0} is denied due to insufficient privilege. </td>
              <td> Service and Business validation </td>
            </tr>
            <tr>
              <td> SEC0002 </td>
              <td> Access Denied. Please contact your Local Security Administrator. </td>
              <td> Security Validation</td>
            </tr>            
            <tr>
              <td> SER0001 </td>
              <td> Please report the issue and provide the API access parameters to CAISO. </td>
              <td> Service and Business validation </td>
            </tr>
            <tr>
              <td> SER0017 </td>
              <td> Invalid request "{0}". </td>
              <td> Service and Business validation </td>
            </tr>
            <tr>
              <td> SER0022 </td>
              <td> Portfolio name can contain alphanumeric or alphanumeric with one or more space, underscore, hyphen and dot. </td>
              <td> Service and Business validation </td>
            </tr>
            <tr>
              <td> SER0028 </td>
              <td> Internal Service Error </td>
              <td> Service and Business validation for response in 500</td>
            </tr>
            <tr>
              <td> SER0029</td>
              <td> Cannot find a resource </td>
              <td> Service and Business validation for response in 404</td>
            </tr>             
            <tr>
              <td> SER0030 </td>
              <td> {0}</td>
              <td> Service and Business validation. Error from other generic data validations or error in the individual record in the body </td>
            </tr>            
          </table>
        type: object
        required:
          - errorList
          - creationTime
  
        properties:
          errorList:
            type: array
            items:
              $ref: '#/components/schemas/ErrorDetail'
          creationTime:
            type: string
            description: date and time when the error is issued.
            format: date-time
            example: '2099-07-04T09:12:33Z'
          serviceVersion:
            type: string
            description: version of service
            maxLength: 10
            example: 'V1.0'
    ErrorDetail:
      type: object
      required:
        - errorCode
        - errorDescription
        - severity

      properties:  
          errorDescription:
            type: string
            description: "JSON syntax error, error in the input parameter of the request (such as the object identifier does not exist), generic data validation (such as the submission window is not open), or error in the individual record"
            maxLength: 1000
            example: "Error description."
          errorCode:
            type: string
            description: error code
            maxLength: 15
            example: 'XXX0000'
          severity:
            type: string
            enum:
              - FATAL
              - ERROR   
    LMMarketStatus:
      type: string
      description: PREP status is for a load migration market that has open date is in the future and it is not yet posted. OPEN status is for a load migration market which is open for UDCs submit their data. CLOSED status is for a load migration market which its UDC data submission period has closed and it is not yet posted. POSTED is for a load migration market that the load transfer and load migration CRRs results have been posted.
      enum:
        - PREP
        - OPEN
        - CLOSED
        - POSTED  
    SubmissionStatus:
      type: string
      description: VALID status is for a successful UDC data submission.
      enum:
        - VALID
    UDCSubmissionStatus:
      type: object
      required:
        - submissionStatus
      properties:
        submissionStatus:
          $ref: '#/components/schemas/SubmissionStatus'
    TimeOfUse:
      type: string
      description: Time-of-Use
      enum:
        - ON
        - OFF  
    Megawatt:
      type: number
      description: quantity unit of CRR
      pattern: '[\-+]?[\d]+\.?\d?\d?\d?'
      format: double
      minimum: 0.001
      multipleOf: 0.001
      example: 0.1  
    YesNo:
      type: string
      description: boolean for Yes or No
      enum:
        - Yes
        - No
    NHourData:
      type: object
      required:
        - defaultLoadAggregationPoint
        - seasonNumber
        - tou
        - effectiveDate
        - hourEnding
      properties:
        defaultLoadAggregationPoint:
          type: string
          pattern: '^([a-zA-Z0-9\. _-]*)$'
          description: name of default load aggregation point
          maxLength: 150
        seasonNumber:
          $ref: '#/components/schemas/Season'
        tou:
          $ref: '#/components/schemas/TimeOfUse'
        effectiveDate:
          type: string
          description: effective date
          format: date-time
          example: '2024-09-01T07:00:00Z'      
        hourEnding:
          type: integer
          description: ending hour
          minimum: 1
          maximum: 25
        lastModified:
          type: string
          description: date and time when N-Hour record is created by the system
          format: date-time
          example: '2021-09-01T07:00:00Z'          
    SubmissionWindow:
      type: object
      required:
        - openDate
        - closeDate
      properties:
        openDate:
          type: string
          description: open date and time of UDC data submission period
          format: date-time
