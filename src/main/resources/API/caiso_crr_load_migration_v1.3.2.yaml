    Season:
      type: integer
      description: number representing one of four quarterly seasons in a year
      enum:
        - 1
        - 2
        - 3
        - 4
    CustomerClass:
      type: string
      description: names of customer classes for LSE
      enum:
        - AGRICULTURAL
        - RESIDENTIAL
        - LARGE15_2
        - LIGHTING
        - MED_COM
        - LARGE1_15
        - SMALL_COM
        - LARGE2_3
        - LARGE3_5
        - LARGE5_8
        - LARGE8_13
        - LARGE13_18
        - LARGE18_24
        - LARGE24_30
        - LARGE30_40
        - LARGE40_50
        - LARGE50_60
        - LARGE60_70
        - LARGE70_80
        - LARGE80_UP
        - INDUSTRIAL   
    CrrType:
      type: string
      description: CRR types applicable to load migration
      enum:
        - LSE_LMT
        - LMT_CNT 
    LoadPercentage:
      type: object
      required:
        - id
        - udc
        - fromLse
        - toLse
        - fromAssetOwner
        - toAssetOwner
        - seasonNumber
        - tou
        - loadPercentage
        - loadTransferMw
      properties:
        id:
          type: integer
          description: unique identifier assigned by the system to a load transfer record
          format: int64
          minimum: 1
          maximum: 9999999999
          example: 191
        udc:
          type: string
          pattern: '^([a-zA-Z0-9\. _-]*)$'
          description: name of UDC
          maxLength: 64
          example: UPGAE, USCE, USDGE
        fromLse:
          type: string
          pattern: '^([a-zA-Z0-9\. _-]*)$'
          description: name of LSE who lost load
          maxLength: 64
          example: LSE1
        toLse:
          type: string
          pattern: '^([a-zA-Z0-9\. _-]*)$'
          description: name of LSE who gained load
          maxLength: 64
          example: LSE2
        fromAssetOwner:
          type: string
          pattern: '^([a-zA-Z0-9\. _-]*)$'
          description: name of asset owner who lost load
          maxLength: 64
          example: AO1
        toAssetOwner:
          type: string
          pattern: '^([a-zA-Z0-9\. _-]*)$'
          description: name of asset owner who gained load
          maxLength: 64
          example: AO2
        seasonNumber:
          $ref: '#/components/schemas/Season'
        tou:
          $ref: '#/components/schemas/TimeOfUse'
        loadPercentage:
          type: number
          description: load percentage
          minimum: 0
          maximum: 100
          format: double
          example: 0.004795
        loadTransferMw:
          type: number
          description: load transfer in mw. The precision can be higher than three decimal places.         
          format: double
          minimum: 0
          maximum: 9223372036854775807
          example: 0.101298
    LoadPercentageResults:
      type: object
      required:
        - loadMigrationMarket
        - loadMigrationPercentages
      properties:
        loadMigrationMarket:
          type: string
          pattern: '^([a-zA-Z0-9\. _-]*)$'
          description: name of load migration market
          maxLength: 50
        loadMigrationPercentages:
          type: array
          description: a list of load percentage for LSE pair of existing load migration CRRs
          items:
            $ref: '#/components/schemas/LoadPercentage'          
            
    LoadMigrationCrr:
      type: object
      required:
        - crrId
        - parentCrrId
        - assetOwner
        - source
        - sink
        - tou
        - startDate
        - endDate
        - crrType
          
      properties:
        crrId:
          type: integer
          description: unique identifier of load migration CRR
          format: int64
          minimum: 1
          maximum: 9999999999
        parentCrrId:
          type: integer
          description: unique identifier of original CRR that load migration CRR is created from
          format: int64
          minimum: 1
          maximum: 9999999999
        assetOwner:
          type: string
          pattern: '^([a-zA-Z0-9\. _-]*)$'
          description: name of asset owner who owns the CRR
          maxLength: 64
        source:
          type: string
          pattern: '^([a-zA-Z0-9\. _-]*)$'
          description: name of source
          maxLength: 150
        sink:
          type: string
          pattern: '^([a-zA-Z0-9\. _-]*)$'
          description: name of sink
          maxLength: 150
        tou:
          $ref: '#/components/schemas/TimeOfUse'        
        startDate:
          type: string
          description: effective start date of CRR
          format: date-time
          example: '2021-09-01T07:00:00Z'
        endDate:
          type: string
          description: effective end date of CRR
          format: date-time
          example: '2021-10-01T07:00:00Z'          
        crrType:
          $ref: '#/components/schemas/CrrType'      
        initialMw:
          type: number
          description: load migration crr MW. When this value is available, it means that this load migration CRR is created by the specified load migration market.  
          pattern: '[\-+]?[\d]+\.?\d?\d?\d?'
          format: double
          example: 0.001  
        adjustedMw:
          type: number
          description : incremental MW added to the specified CRR in the result of the specified load migration market. The CRR was created from a previous load migration market.          
          pattern: '[\-+]?[\d]+\.?\d?\d?\d?'
          format: double
          example: 0.001  
    LoadMigrationResults:
      type: object
      required:
        - loadMigrationMarket
        - loadMigrationCrrs
      properties:
        loadMigrationMarket:
          type: string
          pattern: '^([a-zA-Z0-9\. _-]*)$'
          description: name of load migration market
          maxLength: 50
        loadMigrationCrrs:
          type: array
          description: a list of load migration CRRs and incremental adjusted MW of existing load migration CRRs
          items:
            $ref: '#/components/schemas/LoadMigrationCrr'