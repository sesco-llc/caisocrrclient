  parameters:
    ParticipantName:
      in: query
      name: participantName
      description: Market Participant Name
      required: true
      schema:
        type: string
        pattern: '^([a-zA-Z0-9\. _-]*)$'
        maxLength: 64
      example: CISO
    OfferStatusType:
      name: OfferStatusType
      in: query
      description: status of the secondary market Offer
      required: true
      style: form
      explode: true
      schema:
        type: string
        enum:
        - POSTED
        - PENDING_MP_RESPONSE
        - APPROVED
        - DISAPPROVED
        - PENDING_CREDIT_CHECK
        - ERROR
    ResponseStatusType:
      name: responseStatusType
      in: query
      description: status of the response to the secondary market response
      required: true
      style: form
      explode: true
      schema:
        type: string
        enum:
        - PENDING_MP_RESPONSE
        - APPROVED
        - DISAPPROVED
        - PENDING_CREDIT_CHECK
        - ERROR
    CAISORequestUUID:
      in: header
      name: caiso-request-id
      description: An HTTP header with a unique UUID (Universal Unique Identifier) for every request
      schema:
        type: string
        format: uuid
      required: true
      example: c9b09ec1-3a3a-4e68-a4d7-89aece526b05